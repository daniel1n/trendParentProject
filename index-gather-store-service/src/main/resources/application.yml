spring:
  application:
    name: index-gather-store-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# Dubbo Configuration
dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: tri
    port: 20884
    threads: 200
    queues: 0
    iothreads: 4
  registry:
    address: nacos://localhost:8848
    group: DUBBO_DEFAULT_GROUP
  provider:
    timeout: 30000
    retries: 0
    delay: -1
    loadbalance: roundrobin
  consumer:
    timeout: 30000
    retries: 0
    check: false
    loadbalance: roundrobin
  metadata-report:
    address: nacos://localhost:8848
    group: DUBBO_METADATA

# Management & Observability
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    dubbo:
      enabled: true
    dubbo-consumer:
      enabled: true

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      default:
        baseConfig: default

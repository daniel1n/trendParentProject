spring:
  application:
    name: index-zuul-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  zipkin:
    base-url: http://localhost:9411

zuul:
  routes:
    api-a:
      path: /api-codes/**
      serviceId: index-codes-service
    api-b:
      path: /api-backtest/**
      serviceId: trend-trading-backtest-service
    api-c:
      path: /api-view/**
      serviceId: trend-trading-backtest-view
